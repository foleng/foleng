name: Generate Snake Animation
on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 0 点自动更新（北京时间 8 点）
  workflow_dispatch: # 支持手动触发
  push:
    branches:
      - main # 推送到 main 分支时自动更新

# 关键：给 Actions 足够的权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升级到最新版，解决认证问题

      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: foleng
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4 # 替换为更稳定的 Action，彻底解决权限问题
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output # 推送到 output 分支
